<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitaxe x402 QR Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px;
}
h1 { font-size: 20px; color: #f7931a; margin-bottom: 16px; }

.container {
    width: 100%; max-width: 400px;
    display: flex; gap: 12px; flex-direction: column;
}
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }

.field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
.field input, .field select {
    width: 100%; padding: 10px; border-radius: 8px;
    background: #1a1a2e; border: 1px solid #333; color: #e0e0e0;
    font-size: 14px;
}
.field input:focus, .field select:focus { outline: none; border-color: #f7931a; }
.field select { appearance: none; cursor: pointer; }

.amount-row { display: flex; align-items: center; gap: 6px; }
.amount-row input { flex: 1; }
.amount-row .unit { color: #888; font-size: 13px; font-weight: 700; }

.presets { display: flex; gap: 6px; margin-top: 6px; }
.presets button {
    flex: 1; padding: 6px; border: 1px solid #333; border-radius: 6px;
    background: #1a1a2e; color: #aaa; font-size: 12px; cursor: pointer;
}
.presets button:hover { border-color: #f7931a; color: #f7931a; }

.btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    background: linear-gradient(135deg, #f7931a, #e8850f); color: #000;
}
.btn:active { transform: scale(0.98); }

#qr-result { display: none; text-align: center; }
#qr-box {
    background: #fff; border-radius: 10px; padding: 12px;
    display: inline-block; margin: 8px 0;
}
#pay-url {
    font-family: monospace; font-size: 9px; color: #666;
    word-break: break-all; line-height: 1.4;
    background: #1a1a2e; padding: 8px; border-radius: 6px;
    margin: 8px 0; text-align: left;
}
.net-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 6px;
    font-weight: 700; vertical-align: middle;
}
.net-badge.testnet { background: #f7931a33; color: #f7931a; }
.net-badge.mainnet { background: #3fb95033; color: #3fb950; }

.actions { display: flex; gap: 6px; }
.actions button {
    flex: 1; padding: 10px; border: 1px solid #333; border-radius: 8px;
    background: #1a1a2e; color: #aaa; font-size: 12px; font-weight: 600;
    cursor: pointer;
}
.actions button:hover { border-color: #f7931a; color: #f7931a; }

.footer { margin-top: auto; padding-top: 12px; }
.footer a { color: #444; font-size: 10px; text-decoration: none; }
</style>
</head>
<body>

<h1>Bitaxe x402 QR Generator</h1>

<div class="container">
    <div class="row">
        <div class="field">
            <label>Network</label>
            <select id="input-network" onchange="onNetworkChange()">
                <option value="eip155:84532">Base Sepolia (Testnet)</option>
                <option value="eip155:8453">Base (Mainnet)</option>
                <option value="solana:devnet">Solana Devnet</option>
                <option value="solana:mainnet">Solana Mainnet</option>
                <option value="lightning">Lightning Network</option>
            </select>
        </div>
        <div class="field">
            <label>Duration</label>
            <select id="input-duration">
                <option value="300">5 min</option>
                <option value="1800">30 min</option>
                <option value="3600" selected>1 hour</option>
                <option value="7200">2 hours</option>
                <option value="86400">24 hours</option>
            </select>
        </div>
    </div>

    <div class="field">
        <label id="addr-label">Receive Address</label>
        <input type="text" id="input-to" placeholder="0x..." value="0x933190d1be975d61ba0e712263918b7688d6e49a">
    </div>

    <div class="row">
        <div class="field">
            <label id="amount-label">Amount (USDC)</label>
            <div class="amount-row">
                <input type="number" id="input-amount" placeholder="0.10" value="0.10" step="0.01" min="0.01">
                <span class="unit" id="amount-unit">USDC</span>
            </div>
            <div class="presets" id="presets-usdc">
                <button onclick="setAmount(0.10)">$0.10</button>
                <button onclick="setAmount(0.50)">$0.50</button>
                <button onclick="setAmount(1)">$1</button>
                <button onclick="setAmount(5)">$5</button>
            </div>
            <div class="presets" id="presets-sats" style="display:none">
                <button onclick="setAmount(100)">100</button>
                <button onclick="setAmount(1000)">1K</button>
                <button onclick="setAmount(5000)">5K</button>
                <button onclick="setAmount(21000)">21K</button>
            </div>
        </div>
    </div>

    <button class="btn" onclick="generateQR()">Generate QR Code</button>

    <div id="qr-result">
        <div><span class="net-badge" id="qr-badge"></span></div>
        <div id="qr-box"><div id="qr-target"></div></div>
        <div id="pay-url"></div>
        <div class="actions">
            <button onclick="copyUrl()">Copy URL</button>
            <button onclick="downloadQR()">Download</button>
            <button onclick="testOpen()">Open</button>
        </div>
    </div>
</div>

<div class="footer">
    <a href="https://github.com/linyao0177/boat-mwr">Powered by boat-mwr x402</a>
</div>

<!-- QR Code library (qrcodejs by davidshimjs, MIT license) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const BASE_URL = 'https://linyao0177.github.io/bitaxe-pay/';
let currentUrl = '';

// Solana USDC mints
const SOL_USDC = {
    'solana:mainnet': 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
    'solana:devnet':  '4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU',
};

function setAmount(val) {
    const net = document.getElementById('input-network').value;
    if (net === 'lightning') {
        document.getElementById('input-amount').value = Math.round(val);
    } else {
        document.getElementById('input-amount').value = val.toFixed(2);
    }
}

function onNetworkChange() {
    const net = document.getElementById('input-network').value;
    const isLightning = net === 'lightning';
    const isSolana = net.startsWith('solana:');
    const isEVM = net.startsWith('eip155:');

    // Update address placeholder and label
    const addrInput = document.getElementById('input-to');
    const addrLabel = document.getElementById('addr-label');
    if (isLightning) {
        addrLabel.textContent = 'Lightning Address or LNURL';
        addrInput.placeholder = 'user@getalby.com or lnurl1...';
    } else if (isSolana) {
        addrLabel.textContent = 'Solana Wallet Address';
        addrInput.placeholder = 'Base58 address...';
    } else {
        addrLabel.textContent = 'Receive Address';
        addrInput.placeholder = '0x...';
    }

    // Update amount unit
    document.getElementById('amount-label').textContent =
        isLightning ? 'Amount (sats)' : 'Amount (USDC)';
    document.getElementById('amount-unit').textContent =
        isLightning ? 'sats' : 'USDC';

    // Toggle presets
    document.getElementById('presets-usdc').style.display = isLightning ? 'none' : 'flex';
    document.getElementById('presets-sats').style.display = isLightning ? 'flex' : 'none';

    // Reset amount for Lightning
    if (isLightning) {
        document.getElementById('input-amount').value = '1000';
        document.getElementById('input-amount').step = '1';
        document.getElementById('input-amount').min = '1';
    } else {
        document.getElementById('input-amount').value = '0.10';
        document.getElementById('input-amount').step = '0.01';
        document.getElementById('input-amount').min = '0.01';
    }
}

function generateQR() {
    const to = document.getElementById('input-to').value.trim();
    const network = document.getElementById('input-network').value;
    const duration = document.getElementById('input-duration').value;
    const amountRaw = parseFloat(document.getElementById('input-amount').value);

    if (!to) { alert('Please enter a valid address'); return; }
    if (isNaN(amountRaw) || amountRaw <= 0) { alert('Please enter a valid amount'); return; }

    const isLightning = network === 'lightning';
    const isSolana = network.startsWith('solana:');

    // Validate address format
    if (!isLightning && !isSolana && !to.startsWith('0x')) {
        alert('Please enter a valid Ethereum address (0x...)'); return;
    }

    // Build URL based on network type
    if (isSolana) {
        // Solana Pay URL: solana:<recipient>?amount=<decimal>&spl-token=<mint>
        const mint = SOL_USDC[network];
        const solAmount = amountRaw; // USDC amount as decimal
        const ref = Array.from(crypto.getRandomValues(new Uint8Array(32)))
            .map(b => b.toString(16).padStart(2, '0')).join('');
        currentUrl = `solana:${to}?amount=${solAmount}&spl-token=${mint}&label=Bitaxe&message=Hashrate+rental`;
    } else if (isLightning) {
        // For Lightning: link to payment page with lightning params
        const sats = Math.round(amountRaw);
        const params = new URLSearchParams({ to, amount: sats, network, duration });
        currentUrl = BASE_URL + '?' + params.toString();
    } else {
        // EVM: existing flow
        const amount = Math.round(amountRaw * 1e6);
        const params = new URLSearchParams({ to, amount, network, duration });
        currentUrl = BASE_URL + '?' + params.toString();
    }

    // Badge
    const badge = document.getElementById('qr-badge');
    const testNets = ['eip155:84532', 'solana:devnet'];
    const isTestnet = testNets.includes(network);
    const netNames = {
        'eip155:84532': 'Base Sepolia', 'eip155:8453': 'Base',
        'solana:devnet': 'Solana Devnet', 'solana:mainnet': 'Solana',
        'lightning': 'Lightning',
    };
    badge.textContent = netNames[network] || network;
    badge.className = 'net-badge ' + (isTestnet ? 'testnet' : 'mainnet');

    // URL
    document.getElementById('pay-url').textContent = currentUrl;

    // QR
    const target = document.getElementById('qr-target');
    target.innerHTML = '';
    new QRCode(target, {
        text: currentUrl,
        width: 220,
        height: 220,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById('qr-result').style.display = 'block';
}

function copyUrl() {
    navigator.clipboard.writeText(currentUrl).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        btn.style.color = '#3fb950';
        setTimeout(() => { btn.textContent = 'Copy URL'; btn.style.color = ''; }, 1500);
    });
}

function downloadQR() {
    // qrcodejs creates canvas (hidden) + img; use img if canvas unavailable
    let canvas = document.querySelector('#qr-target canvas');
    if (!canvas) {
        const img = document.querySelector('#qr-target img');
        if (!img) return;
        canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);
    }

    const pad = 32;
    const labelH = 40;
    const w = canvas.width + pad * 2;
    const h = canvas.height + pad * 2 + labelH;

    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const ctx = out.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(canvas, pad, pad);

    ctx.fillStyle = '#000000';
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    const amt = document.getElementById('input-amount').value;
    const net = document.getElementById('input-network').value;
    const netNames = {
        'eip155:84532': 'Base Sepolia', 'eip155:8453': 'Base',
        'solana:devnet': 'Solana Devnet', 'solana:mainnet': 'Solana',
        'lightning': 'Lightning',
    };
    const netName = netNames[net] || net;
    const unit = net === 'lightning' ? 'sats' : 'USDC';
    ctx.fillText('Bitaxe x402 — ' + amt + ' ' + unit + ' (' + netName + ')', w / 2, h - pad + 8);

    const link = document.createElement('a');
    link.download = 'bitaxe-x402-qr.png';
    link.href = out.toDataURL('image/png');
    link.click();
}

function testOpen() {
    window.open(currentUrl, '_blank');
}
</script>
</body>
</html>
